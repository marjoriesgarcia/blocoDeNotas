<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de Notas — Floral Pastel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- decoração de fundo com SVG minimalista -->
    <div class="bg-flowers" aria-hidden="true">
        <!-- SVG leve com flores brancas repetidas -->
        <svg class="flowers" width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <g id="flower">
                    <circle cx="0" cy="0" r="6" fill="#fff"/>
                    <g fill="#fff" opacity="0.9">
                        <ellipse rx="12" ry="6" transform="rotate(0)"/>
                        <ellipse rx="12" ry="6" transform="rotate(72)"/>
                        <ellipse rx="12" ry="6" transform="rotate(144)"/>
                        <ellipse rx="12" ry="6" transform="rotate(216)"/>
                        <ellipse rx="12" ry="6" transform="rotate(288)"/>
                    </g>
                </g>
            </defs>
            <use href="#flower" x="60" y="80" opacity="0.12"/>
            <use href="#flower" x="220" y="40" opacity="0.10"/>
            <use href="#flower" x="400" y="120" opacity="0.09"/>
            <use href="#flower" x="620" y="60" opacity="0.11"/>
            <use href="#flower" x="120" y="320" opacity="0.08"/>
            <use href="#flower" x="480" y="360" opacity="0.10"/>
            <use href="#flower" x="700" y="420" opacity="0.07"/>
        </svg>
    </div>

    <main class="container" role="main">
        <header class="top">
            <div class="brand">
                <span class="logo" aria-hidden="true">✿</span>
                <div>
                    <h1>Meu Bloco de Notas</h1>
                    <p class="tagline">Pastel, leve e autosalvo — agora com estilo.</p>
                </div>
            </div>

            <div class="toolbar" role="toolbar" aria-label="Ações">
                <button id="salvarNotas" type="button" title="Salvar (Ctrl/Cmd+S)">
                    <!-- ícone save -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 4v16h14V8l-6-4H5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Salvar
                </button>

                <button id="limparNotas" type="button" title="Limpar notas">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 6h18M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6M10 6V4a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Limpar
                </button>

                <button id="exportarNotas" type="button" title="Exportar como .txt">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12M8 7l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Exportar
                </button>

                <div id="statusSalvar" role="status" aria-live="polite" class="status">
                    <span class="dot saved" aria-hidden="true"></span>
                    <span class="status-text">Salvo automaticamente</span>
                </div>
            </div>
        </header>

        <label for="blocoDeNotas" class="sr-only">Área de anotações</label>
        <textarea id="blocoDeNotas" placeholder="Comece a digitar aqui..." aria-label="Área de anotações"></textarea>

        <footer class="foot">
            <small>Local only · Nenhum dado envia para servidor</small>
        </footer>
    </main>

    <noscript>
        <p>Ative o JavaScript para usar o bloco de notas.</p>
    </noscript>

    <script src="script.js"></script>
</body>
</html>
